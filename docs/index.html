<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maniac Stefan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: pointer; }
  video {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
  }
  #unmute {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: 1px solid #555;
    padding: 10px 24px;
    font: 16px monospace;
    cursor: pointer;
    z-index: 10;
  }
  #unmute:hover { background: rgba(50,50,50,0.9); }
</style>
</head>
<body>
<video id="v" autoplay loop muted playsinline>
  <source src="https://github.com/sttts/maniac/releases/download/latest/intro.mp4" type="video/mp4">
</video>
<button id="unmute">Click for sound</button>
<script>
  var v = document.getElementById('v');
  var btn = document.getElementById('unmute');
  function unmute() {
    v.muted = false;
    v.currentTime = 0;
    btn.style.display = 'none';
    document.body.style.cursor = '';
  }
  btn.addEventListener('click', unmute);
  document.body.addEventListener('click', function(e) {
    if (e.target !== btn) unmute();
  });
</script>
</body>
</html>
