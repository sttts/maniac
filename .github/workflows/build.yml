name: Build Video

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsdl2-2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render video
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python src/main.py

      - name: Generate screenshot
        run: make screenshot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intro-video
          path: |
            output/intro.mp4
            assets/screenshot.png

      - name: Upload to release (on push to master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create or update the "latest" release with video and screenshot
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest output/intro.mp4 assets/screenshot.png \
            --title "Latest Build" \
            --notes "Auto-built intro video from latest master." \
            --prerelease
